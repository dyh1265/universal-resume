# Website and app on YOUR server (Docker + reverse proxy). Chat backend is configurable via .env.
#
# 1) OpenAI: OPENAI_API_KEY=sk-... (from platform.openai.com), OPENAI_MODEL=gpt-4o-mini (or other).
#    Omit OPENAI_BASE_URL to use https://api.openai.com.
#
# 2) Ollama (local): OPENAI_BASE_URL=http://host.docker.internal:11434/v1, OPENAI_API_KEY=ollama,
#    OPENAI_MODEL matching `ollama pull`. Requires extra_hosts (below) and Ollama on the host.
#
# 3) Azure OpenAI: unset OPENAI_BASE_URL; set AZURE_OPENAI_API_KEY, AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_DEPLOYMENT.
#    OPENAI_* is used first if OPENAI_API_KEY or OPENAI_BASE_URL is set.
#
# 4) docker compose up -d --build
#
# 5) Terminate TLS with Nginx/Caddy on 443 → http://127.0.0.1:8080 (tutorial.md).
#    curl -sI http://127.0.0.1:8080/ | head -n1  should show HTTP/1.1 200.

services:
  resume:
    build:
      context: .
      dockerfile: Dockerfile.chat
    ports:
      - "127.0.0.1:8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    restart: unless-stopped
